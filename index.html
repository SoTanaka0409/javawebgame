<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gy楽試案パズル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans flex flex-col items-center justify-center min-h-screen">
    <!-- TITLE SCREEN -->
    <div id="title-screen" class="flex flex-col items-center justify-center w-full h-full">
        <h1 class="text-6xl font-bold mb-8 text-indigo-400 drop-shadow-2xl tracking-wider">Gy楽試案パズル</h1>
        <p class="text-slate-300 mb-12 text-xl font-light">ブロックを動かして敵を討伐せよ！</p>
        <button onclick="startGame()" class="px-10 py-5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded-full text-2xl transition-transform duration-200 shadow-[0_0_15px_rgba(99,102,241,0.5)] hover:scale-105 active:scale-95">GAME START</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="hidden flex-col items-center w-full max-w-lg">
        <!-- Player & Enemy Status -->
        <div class="flex w-full max-w-md justify-between mb-4 px-4">
            <!-- Player -->
            <div class="flex flex-col items-center w-5/12 relative" id="player-container">
                <img src="player.png" id="player-img" class="character-img" alt="Player">
                <span class="font-bold text-blue-300">Player</span>
                <div class="w-full bg-slate-700 h-4 rounded-full mt-1 overflow-hidden shadow-inner">
                    <div id="player-hp-bar" class="bg-gradient-to-r from-blue-600 to-blue-400 h-full w-full transition-all duration-300"></div>
                </div>
                <span id="player-hp-text" class="text-xs mt-1">100 / 100</span>
            </div>
            <!-- VS -->
            <div class="flex items-center justify-center w-2/12 font-bold text-xl text-slate-500 flex-col">
                <span id="stage-indicator" class="text-xs text-indigo-300 mb-1 bg-indigo-900/50 px-2 py-1 rounded">Stage 1/3</span>
                <span class="text-2xl drop-shadow">VS</span>
                <span id="turn-counter" class="text-xs text-slate-400 mt-2 bg-slate-800 px-2 py-1 rounded">Turn: 0</span>
            </div>
            <!-- Enemy -->
            <div class="flex flex-col items-center w-5/12 relative" id="enemy-container">
                <img src="enemy.png" id="enemy-img" class="character-img" alt="Enemy">
                <span id="enemy-name" class="font-bold text-red-300">Enemy</span>
                <div class="w-full bg-slate-700 h-4 rounded-full mt-1 overflow-hidden shadow-inner">
                    <div id="enemy-hp-bar" class="bg-gradient-to-r from-red-600 to-orange-500 h-full w-full transition-all duration-300"></div>
                </div>
                <div class="flex justify-between w-full mt-1">
                    <span id="enemy-hp-text" class="text-xs">500 / 500</span>
                    <span id="enemy-status" class="text-xs text-purple-400 font-bold drop-shadow"></span>
                </div>
            </div>
        </div>

        <div id="game-board" class="grid grid-cols-6 gap-2 bg-slate-800 p-4 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-slate-700"></div>
        <div class="mt-6 text-2xl font-bold bg-slate-800 px-6 py-2 rounded-full shadow-lg">SCORE: <span id="score" class="text-yellow-400">0</span></div>
        <p class="mt-4 text-slate-400 text-sm">隣り合う2つのブロックをクリックして入れ替えよう！</p>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden flex-col items-center justify-center w-full h-full">
        <h1 id="result-title" class="text-6xl font-black mb-6 text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]">GAME CLEAR!</h1>
        <p class="text-xl text-slate-300 mb-2">FINAL SCORE</p>
        <p id="result-score" class="text-7xl font-bold text-white mb-12 drop-shadow-md">0</p>
        <button onclick="returnToTitle()" class="px-8 py-4 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-full text-xl transition-all shadow-lg border border-slate-600 hover:scale-105 active:scale-95">タイトルへ戻る</button>
    </div>

    <!-- BGM用のオーディオタグ (後で bgm.mp3 をフォルダに入れれば再生されます) -->
    <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

    <!-- 外部スクリプトの読み込み -->
    <script src="game.js"></script>
</body>
</html>
